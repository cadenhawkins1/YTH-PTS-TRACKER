<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youth Points Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght=500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; background-color: #F4F5F1; }
    </style>
</head>
<body class="min-h-screen text-[#1B2421] pb-24">

    <div class="max-w-md mx-auto">
        <!-- Header -->
        <div class="bg-[#164E49] text-white rounded-b-3xl px-5 pb-6 pt-8 shadow-md">
            <h1 class="text-2xl font-bold">Youth Points</h1>
            <p id="member-count" class="text-sm text-[#9FC4BF] mt-0.5">Local Standalone Mode</p>
        </div>

        <!-- Navigation Tabs (Guaranteed click handlers) -->
        <div class="flex justify-around my-4 px-4 bg-white py-2 shadow-sm rounded-xl mx-2">
            <button onclick="switchTab('tracker')" id="tab-tracker" class="font-bold border-b-2 border-[#164E49] pb-1 text-[#164E49] px-4 py-2 cursor-pointer">Points</button>
            <button onclick="switchTab('leaderboard')" id="tab-leaderboard" class="font-bold border-b-2 border-transparent pb-1 text-gray-400 px-4 py-2 cursor-pointer">Leaderboard</button>
            <button onclick="switchTab('add')" id="tab-add" class="font-bold border-b-2 border-transparent pb-1 text-gray-400 px-4 py-2 cursor-pointer">Add Student</button>
        </div>

        <!-- Tab 1: Points Tracker -->
        <div id="content-tracker" class="px-5 space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm text-center">
                <p class="text-gray-500 mb-2">Select a student from the list:</p>
                <select id="student-dropdown" class="w-full bg-[#F1F2F0] rounded-xl p-3 font-medium focus:outline-none">
                    <option value="">-- No Students Registered Yet --</option>
                </select>
                <p class="text-xs text-gray-400 mt-4">Go to the "Add Student" tab above to create one!</p>
            </div>
        </div>

        <!-- Tab 2: Leaderboard -->
        <div id="content-leaderboard" class="hidden px-5 space-y-2">
            <div class="bg-white p-6 rounded-3xl shadow-sm text-center">
                <p class="text-gray-500">Leaderboard updates instantly when students are added.</p>
            </div>
        </div>

        <!-- Tab 3: Add Student -->
        <div id="content-add" class="hidden px-5">
            <div class="bg-white p-5 rounded-3xl shadow-sm">
                <h3 class="font-bold mb-3 text-lg">Add New Student</h3>
                <input id="new-student-name" type="text" placeholder="Type student name here..." class="w-full bg-[#F1F2F0] rounded-2xl px-4 py-3 mb-4 focus:outline-none border border-transparent focus:border-[#164E49]">
                <button onclick="addNewStudent()" class="w-full bg-[#164E49] text-white font-semibold py-3 rounded-2xl active:scale-95 transition-transform">Add Student</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed left-1/2 -translate-x-1/2 bottom-6 text-sm px-4 py-2 rounded-full shadow-lg bg-[#1B2421] text-white hidden z-50"></div>

    <script>
        // Internal data storage array so it doesn't need external connections to function
        let students = [];

        function switchTab(tabName) {
            // Forcefully reset all views
            ['tracker', 'leaderboard', 'add'].forEach(t => {
                document.getElementById('content-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).className = "font-bold border-b-2 border-transparent pb-1 text-gray-400 px-4 py-2 cursor-pointer";
            });

            // Activate chosen view
            document.getElementById('content-' + tabName).classList.remove('hidden');
            document.getElementById('tab-' + tabName).className = "font-bold border-b-2 border-[#164E49] pb-1 text-[#164E49] px-4 py-2 cursor-pointer";
            
            if (tabName === 'leaderboard') renderLeaderboard();
        }

        function addNewStudent() {
            const input = document.getElementById('new-student-name');
            const name = input.value.trim();
            if (!name) return;

            // Save locally
            students.push({ id: Date.now(), name: name, points: 0 });
            
            showToast(`${name} added successfully!`);
            input.value = '';
            
            // Update UI components
            updateDropdown();
            document.getElementById('member-count').innerText = `${students.length} ${students.length === 1 ? 'person' : 'people'} tracked`;
            
            // Auto swap back to points manager
            switchTab('tracker');
        }

        function updateDropdown() {
            const dropdown = document.getElementById('student-dropdown');
            if (students.length === 0) {
                dropdown.innerHTML = `<option value="">-- No Students Registered Yet --</option>`;
                return;
            }
            dropdown.innerHTML = students.map(s => `<option value="${s.id}">${s.name} (${s.points} pts)</option>`).join('');
        }

        function renderLeaderboard() {
            const container = document.getElementById('content-leaderboard');
            if (students.length === 0) {
                container.innerHTML = `<div class="bg-white p-6 rounded-3xl shadow-sm text-center text-gray-400">No data loaded yet.</div>`;
                return;
            }
            let html = '';
            [...students].sort((a,b) => b.points - a.points).forEach((s, i) => {
                html += `
                    <div class="bg-white rounded-2xl p-4 flex items-center justify-between shadow-sm mb-2">
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-[#164E49]">#${i + 1}</span>
                            <span class="font-medium">${s.name}</span>
                        </div>
                        <span class="bg-[#F5E6C8] text-[#8A6415] rounded-full px-3 py-1 text-xs font-bold">${s.points} pts</span>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }
    </script>
</body>
</html>
