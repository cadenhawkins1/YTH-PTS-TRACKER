<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youth Points Tracker</title>
    <!-- Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght=500;700&display=swap" rel="stylesheet">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Fredoka', sans-serif; background-color: #F4F5F1; }
    </style>
</head>
<body class="min-h-screen text-[#1B2421] pb-24">

    <!-- MAIN APP SCREEN -->
    <div id="app-screen" class="max-w-md mx-auto">
        <!-- Header -->
        <div class="bg-[#164E49] text-white rounded-b-3xl px-5 pb-6 pt-8 shadow-md">
            <h1 class="text-2xl font-bold">Youth Points</h1>
            <p id="member-count" class="text-sm text-[#9FC4BF] mt-0.5">0 people tracked</p>
            <input id="search-input" oninput="filterDropdownAndList()" type="text" placeholder="Search names..." class="w-full mt-4 rounded-2xl px-4 py-3 text-sm text-[#1B2421] focus:outline-none">
        </div>

        <!-- Navigation Tabs -->
        <div class="flex justify-around my-4 px-4">
            <button onclick="switchTab('tracker')" id="tab-tracker" class="font-bold border-b-2 border-[#164E49] pb-1 text-[#164E49] py-2 px-4 cursor-pointer">Points</button>
            <button onclick="switchTab('leaderboard')" id="tab-leaderboard" class="font-bold border-b-2 border-transparent pb-1 text-gray-400 py-2 px-4 cursor-pointer">Leaderboard</button>
            <button onclick="switchTab('add')" id="tab-add" class="font-bold border-b-2 border-transparent pb-1 text-gray-400 py-2 px-4 cursor-pointer">Add Student</button>
        </div>

        <!-- Tab Content 1: Points Tracker -->
        <div id="content-tracker" class="px-5 space-y-2">
            <select id="student-dropdown" onchange="selectStudent()" class="w-full bg-white border border-gray-200 rounded-2xl p-4 font-medium focus:outline-none shadow-sm"></select>
            
            <div id="points-display-card" class="bg-white rounded-3xl p-6 shadow-sm text-center my-4 hidden">
                <span id="selected-student-name" class="block text-gray-500 text-sm font-medium mb-1">Select a student</span>
                <div class="w-28 h-28 mx-auto bg-[#F5E6C8] border-2 border-[#C9962E] rounded-full flex flex-col items-center justify-center">
                    <span id="selected-student-pts" class="text-2xl font-bold text-[#8A6415]">0</span>
                    <span class="text-xs text-[#8A6415]">points</span>
                </div>
                
                <!-- Add / Subtract Toggle -->
                <div class="flex bg-[#F1F2F0] p-1 rounded-2xl my-4">
                    <button id="btn-mode-add" onclick="setMode('add')" class="flex-1 py-2 rounded-xl text-sm font-semibold bg-[#3F9142] text-white">Add</button>
                    <button id="btn-mode-sub" onclick="setMode('subtract')" class="flex-1 py-2 rounded-xl text-sm font-semibold text-gray-400">Subtract</button>
                </div>

                <!-- Preset Buttons -->
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="adjustPoints(10)" class="preset-btn bg-[#E8F3E8] text-[#2C6B2F] py-3 rounded-xl font-bold active:scale-95 transition-transform">+10</button>
                    <button onclick="adjustPoints(25)" class="preset-btn bg-[#E8F3E8] text-[#2C6B2F] py-3 rounded-xl font-bold active:scale-95 transition-transform">+25</button>
                    <button onclick="adjustPoints(50)" class="preset-btn bg-[#E8F3E8] text-[#2C6B2F] py-3 rounded-xl font-bold active:scale-95 transition-transform">+50</button>
                    <button onclick="adjustPoints(100)" class="preset-btn bg-[#E8F3E8] text-[#2C6B2F] py-3 rounded-xl font-bold active:scale-95 transition-transform">+100</button>
                    <button onclick="adjustPoints(150)" class="preset-btn bg-[#E8F3E8] text-[#2C6B2F] py-3 rounded-xl font-bold active:scale-95 transition-transform">+150</button>
                    <button onclick="toggleCustom()" class="bg-[#F1F2F0] text-gray-500 py-3 rounded-xl font-bold text-sm">Custom</button>
                </div>

                <!-- Custom Input -->
                <div id="custom-input-div" class="hidden mt-3 flex gap-2">
                    <input id="custom-amount" type="number" placeholder="Amount" class="flex-1 bg-[#F1F2F0] rounded-xl px-4 py-2 text-center focus:outline-none">
                    <button onclick="applyCustomPoints()" class="bg-[#3F9142] text-white px-6 rounded-xl font-semibold">Apply</button>
                </div>
            </div>
        </div>

        <!-- Tab Content 2: Leaderboard -->
        <div id="content-leaderboard" class="hidden px-5 space-y-2"></div>

        <!-- Tab Content 3: Add Student -->
        <div id="content-add" class="hidden px-5">
            <div class="bg-white p-5 rounded-3xl shadow-sm">
                <h3 class="font-bold mb-3">Add New Student</h3>
                <input id="new-student-name" type="text" placeholder="Full Name" class="w-full bg-[#F1F2F0] rounded-2xl px-4 py-3 mb-3 focus:outline-none">
                <button onclick="addNewStudent()" class="w-full bg-[#164E49] text-white font-semibold py-3 rounded-2xl">Add Student</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed left-1/2 -translate-x-1/2 bottom-6 text-sm px-4 py-2 rounded-full shadow-lg bg-[#1B2421] text-white hidden z-50"></div>

    <script>
        // Simple Tab Changer (Completely isolated from database setup)
        function switchTab(tab) {
            const tabs = ['tracker', 'leaderboard', 'add'];
            
            tabs.forEach(t => {
                const contentBlock = document.getElementById('content-' + t);
                const tabButton = document.getElementById('tab-' + t);
                
                if (contentBlock) {
                    contentBlock.style.setProperty('display', 'none', 'important');
                    contentBlock.classList.add('hidden');
                }
                if (tabButton) {
                    tabButton.className = "font-bold border-b-2 border-transparent pb-1 text-gray-400 py-2 px-4 cursor-pointer";
                }
            });

            const activeContent = document.getElementById('content-' + tab);
            const activeTab = document.getElementById('tab-' + tab);
            
            if (activeContent) {
                activeContent.style.setProperty('display', 'block', 'important');
                activeContent.classList.remove('hidden');
            }
            if (activeTab) {
                activeTab.className = "font-bold border-b-2 border-[#164E49] pb-1 text-[#164E49] py-2 px-4 cursor-pointer";
            }
            
            if (tab === 'leaderboard') renderLeaderboard();
        }

        // Supabase Database Setup
        const SUPABASE_URL = "https://kotfrrazrzjyruvszzyi.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvdGZycmF6cnpqeXJ1dnN6enlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNzM5MDEsImV4cCI6MjA5OTY0OTkwMX0.HiqMM4EyJMEL-umLe2N_c89_L9Ws5nfb5nl6BGU_c7Q";

        let supabase = null;
        let students = [];
        let selectedId = null;
        let mode = 'add'; 

        window.onload = function() {
            try {
                if (window.supabase && typeof window.supabase.createClient === 'function') {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    fetchData();
                } else {
                    showToast("Database plugin missing. Running offline mode.");
                }
            } catch (err) {
                console.error("Initialization error:", err);
            }
        };

        async function fetchData() {
            if (!supabase) return;
            try {
                const { data, error } = await supabase
                    .from('students')
                    .select('*')
                    .order('name', { ascending: true });

                if (!error && data) {
                    students = data;
                    const countEl = document.getElementById('member-count');
                    if (countEl) countEl.innerText = `${students.length} ${students.length === 1 ? 'person' : 'people'} tracked`;
                    populateDropdown(students);
                }
            } catch (err) {
                console.error("Fetch crash prevented:", err);
            }
        }

        function populateDropdown(listToRender) {
            const dropdown = document.getElementById('student-dropdown');
            if (!dropdown) return;
            dropdown.innerHTML = `<option value="">-- Select a Student --</option>`;
            listToRender.forEach(s => {
                dropdown.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });
            if (selectedId) {
                dropdown.value = selectedId;
                selectStudent();
            }
        }

        function filterDropdownAndList() {
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            const filtered = students.filter(s => s.name.toLowerCase().includes(searchVal));
            populateDropdown(filtered);
        }

        function selectStudent() {
            const drop = document.getElementById('student-dropdown');
            if (!drop) return;
            selectedId = parseInt(drop.value);
            const card = document.getElementById('points-display-card');
            if (!card) return;
            if (!selectedId) {
                card.classList.add('hidden');
                return;
            }
            const student = students.find(s => s.id === selectedId);
            if (!student) return;
            document.getElementById('selected-student-name').innerText = student.name;
            document.getElementById('selected-student-pts').innerText = student.points.toLocaleString();
            card.classList.remove('hidden');
        }

        function setMode(newMode) {
            mode = newMode;
            const isAdd = mode === 'add';
            document.getElementById('btn-mode-add').className = `flex-1 py-2 rounded-xl text-sm font-semibold ${isAdd ? 'bg-[#3F9142] text-white' : 'text-gray-400'}`;
            document.getElementById('btn-mode-sub').className = `flex-1 py-2 rounded-xl text-sm font-semibold ${!isAdd ? 'bg-[#C1543C] text-white' : 'text-gray-400'}`;
            
            document.querySelectorAll('.preset-btn').forEach((btn, index) => {
                const values = [10, 25, 50, 100, 150];
                btn.innerText = `${isAdd ? '+' : '-'}${values[index]}`;
                btn.className = isAdd 
                    ? 'preset-btn bg-[#E8F3E8] text-[#2C6B2F] py-3 rounded-xl font-bold active:scale-95 transition-transform' 
                    : 'preset-btn bg-[#FBEAE6] text-[#93402E] py-3 rounded-xl font-bold active:scale-95 transition-transform';
            });
        }

        async function adjustPoints(amount) {
            if (!selectedId) return;
            const student = students.find(s => s.id === selectedId);
            if (!student) return;
            const delta = mode === 'add' ? amount : -amount;
            const newPoints = Math.max(0, student.points + delta);

            if (!supabase) {
                showToast("Offline mode: changes cannot save.");
                return;
            }

            const { error } = await supabase
                .from('students')
                .update({ points: newPoints })
                .eq('id', selectedId);

            if (!error) {
                showToast(`${mode === 'add' ? '+' : '-'}${amount} points applied to ${student.name}`);
                fetchData();
            } else {
                showToast("Failed to save changes.");
            }
        }

        function toggleCustom() {
            const div = document.getElementById('custom-input-div');
            if (div) div.classList.toggle('hidden');
        }

        async function applyCustomPoints() {
            const amountInput = document.getElementById('custom-amount');
            if (!amountInput) return;
            const val = parseInt(amountInput.value);
            if (!val || val <= 0) return;
            await adjustPoints(val);
            amountInput.value = '';
            document.getElementById('custom-input-div').classList.add('hidden');
        }

        async function addNewStudent() {
            const nameInput = document.getElementById('new-student-name');
            if (!nameInput) return;
            const name = nameInput.value.trim();
            if (!name) return;

            if (!supabase) {
                showToast("Offline mode: cannot add student.");
                return;
            }

            const { error } = await supabase
                .from('students')
                .insert([{ name, points: 0 }]);

            if (!error) {
                showToast(`${name} added!`);
                nameInput.value = '';
                await fetchData();
                switchTab('tracker');
            }
        }

        function renderLeaderboard() {
            const container = document.getElementById('content-leaderboard');
            if (!container) return;
            container.innerHTML = '';
            
            if (students.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 text-sm mt-4">No data loaded.</div>';
                return;
            }

            const sorted = [...students].sort((a, b) => b.points - a.points);
            sorted.forEach((s, i) => {
                container.innerHTML += `
                    <div class="bg-white rounded-2xl p-4 flex items-center justify-between shadow-sm">
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-[#164E49] w-6">#${i + 1}</span>
                            <span class="font-medium">${s.name}</span>
                        </div>
                        <span class="bg-[#F5E6C8] text-[#8A6415] rounded-full px-3 py-1 text-xs font-bold">${s.points.toLocaleString()} pts</span>
                    </div>
                `;
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
